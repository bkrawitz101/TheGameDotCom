<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XtheGAME - Deep Fractal Holonic Browser</title>
    <style>
        :root {
            --bg-color: #000000; 
            --text-color: #ffffff; 
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            transition: background-color 2s ease;
        }

        /* --- DYNAMIC ASYMMETRICAL STARFIELD --- */
        #starfield {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* --- INTRO SCREEN STYLES --- */
        #intro-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            background-color: transparent; 
            transition: opacity 2s ease, visibility 2s;
        }

        #intro-message {
            opacity: 0;
            color: var(--text-color);
            font-size: clamp(1.2rem, 3vw, 2.5rem);
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            cursor: pointer;
            padding: 20px 40px;
            border: 1px solid transparent;
            transition: opacity 2s ease, border-color 0.5s, text-shadow 0.5s, transform 0.5s;
            text-align: center;
            z-index: 10000;
        }

        #intro-message.visible {
            opacity: 1;
        }

        #intro-message:hover {
            border-color: var(--text-color);
            text-shadow: 0 0 20px var(--text-color);
            transform: scale(1.05);
        }

        /* --- MAIN APP UI --- */
        #main-app {
            opacity: 0;
            visibility: hidden;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 3s ease, visibility 3s;
            position: absolute;
            top: 0; left: 0;
            z-index: 10;
        }

        #main-app.active {
            opacity: 1;
            visibility: visible;
        }

        .nav-header {
            position: absolute;
            top: 2%;
            width: 100%;
            text-align: center;
            z-index: 100;
            pointer-events: none; /* Let clicks pass through if needed */
        }

        .nav-header h1 {
            margin: 0;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            text-shadow: 0 0 15px var(--text-color);
            color: var(--text-color);
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            transition: color 1s;
        }

        .nav-hint {
            margin-top: 10px;
            color: #88c0d0;
            letter-spacing: 2px;
            font-size: 0.9rem;
            text-transform: uppercase;
            opacity: 0.7;
            transition: opacity 0.5s;
        }

        .nav-hint.visible {
            opacity: 1;
        }

        /* The Main Viewport for Fractal Zooming */
        #fractal-viewport {
            position: relative;
            width: 80vmin; 
            height: 80vmin;
            max-width: 750px;
            max-height: 750px;
            margin-top: 5vh;
        }

        /* 
           THE FRACTAL ANIMATION MAGIC
           Extremely slow, deep scale (30x) with rotation to create a 
           hyperspace blending effect where layers crossfade beautifully.
        */
        .holonic-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transform-origin: center center; 
            transition: transform 4s cubic-bezier(0.4, 0.0, 0.2, 1), opacity 4s ease-in-out;
            will-change: transform, opacity;
        }

        .state-active {
            transform: scale(1) rotate(0deg);
            opacity: 1;
            pointer-events: auto;
            z-index: 10;
        }

        .state-zoomed-in {
            /* Flies past camera, spinning 45 degrees, getting 30x bigger */
            transform: scale(30) rotate(45deg);
            opacity: 0;
            pointer-events: none;
            z-index: 20;
        }

        .state-zoomed-out {
            /* Starts tiny and rotated backwards from deep in the center */
            transform: scale(0.01) rotate(-45deg);
            opacity: 0;
            pointer-events: none;
            z-index: 5;
        }

        /* Outer Rotating Gradient Ring */
        .outer-ring {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 0deg, 
                #8b5cf6, #ec4899, #ef4444, #f97316, 
                #eab308, #22c55e, #06b6d4, #3b82f6, #8b5cf6);
            animation: spin 60s linear infinite;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        /* Inner mask to hollow out the ring */
        .inner-mask {
            position: absolute;
            top: 4%; left: 4%; 
            width: 92%; height: 92%;
            border-radius: 50%;
            background-color: var(--bg-color);
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
            z-index: 5;
        }

        /* Orbiting Nodes on the Outer Ring (16 Nodes) */
        .edge-nodes-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 6;
            animation: spin 60s linear infinite;
        }

        .edge-node {
            position: absolute;
            width: 4.5%; 
            height: 4.5%;
            background: radial-gradient(circle at 30% 30%, #ffffff, #888888);
            border: 2px solid var(--text-color);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5), inset 0 0 5px #000;
            transform: translate(-50%, -50%);
        }

        .en-1  { top: 4%; left: 50%; }
        .en-2  { top: 7.5%; left: 67.6%; }
        .en-3  { top: 17.47%; left: 82.53%; }
        .en-4  { top: 32.4%; left: 92.5%; }
        .en-5  { top: 50%; left: 96%; }
        .en-6  { top: 67.6%; left: 92.5%; }
        .en-7  { top: 82.53%; left: 82.53%; }
        .en-8  { top: 92.5%; left: 67.6%; }
        .en-9  { top: 96%; left: 50%; }
        .en-10 { top: 92.5%; left: 32.4%; }
        .en-11 { top: 82.53%; left: 17.47%; }
        .en-12 { top: 67.6%; left: 7.5%; }
        .en-13 { top: 50%; left: 4%; }
        .en-14 { top: 32.4%; left: 7.5%; }
        .en-15 { top: 17.47%; left: 17.47%; }
        .en-16 { top: 7.5%; left: 32.4%; }

        /* The Petals Container */
        .petals-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 50%;
            z-index: 10;
        }

        .petal {
            position: absolute;
            width: 21%; height: 21%; 
            border-radius: 50%;
            mix-blend-mode: var(--blend-mode);
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0.85;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .petal:hover {
            transform: scale(1.15);
            z-index: 20;
            opacity: 1;
            box-shadow: 0 0 40px currentColor;
        }

        .petal::after {
            content: "ZOOM";
            opacity: 0;
            color: #fff;
            font-size: 0.7rem;
            font-weight: bold;
            letter-spacing: 2px;
            transition: opacity 0.3s;
            text-shadow: 0 0 5px #000;
        }

        .petal:hover::after {
            opacity: 1;
        }

        .p-north { top: 23.5%; left: 39.5%; background-color: #8b5cf6; color: #8b5cf6; } 
        .p-ne    { top: 28.18%; left: 50.82%; background-color: #ec4899; color: #ec4899; } 
        .p-east  { top: 39.5%; left: 55.5%; background-color: #ef4444; color: #ef4444; } 
        .p-se    { top: 50.82%; left: 50.82%; background-color: #f97316; color: #f97316; } 
        .p-south { top: 55.5%; left: 39.5%; background-color: #eab308; color: #eab308; } 
        .p-sw    { top: 50.82%; left: 28.18%; background-color: #22c55e; color: #22c55e; } 
        .p-west  { top: 39.5%; left: 23.5%; background-color: #06b6d4; color: #06b6d4; } 
        .p-nw    { top: 28.18%; left: 28.18%; background-color: #3b82f6; color: #3b82f6; } 

        /* Center Galaxy Core */
        .center-core {
            position: absolute;
            top: 36%; left: 36%;
            width: 28%; height: 28%;
            border-radius: 50%;
            background: radial-gradient(circle at center, var(--core-center) 0%, var(--core-mid) 25%, var(--bg-color) 70%);
            border: 5px dotted var(--text-color);
            box-shadow: 0 0 50px rgba(128, 128, 128, 0.4), inset 0 0 30px var(--core-mid);
            z-index: 30;
            cursor: pointer;
            transition: all 0.4s ease;
            animation: spinReverse 40s linear infinite;
        }

        .center-core:hover {
            transform: scale(1.05) rotate(-10deg);
            box-shadow: 0 0 80px rgba(128, 128, 128, 0.7), inset 0 0 40px #4dc4ff;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spinReverse { 100% { transform: rotate(-360deg); } }

        /* Modal Info Panel */
        .info-panel {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--panel-bg);
            border: 1px solid var(--glow-color, var(--text-color));
            padding: 20px 30px;
            border-radius: 15px;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), 0 0 15px var(--glow-color, rgba(128, 128, 128, 0.2));
            backdrop-filter: blur(10px);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
            z-index: 1000;
            pointer-events: none;
            color: var(--text-color);
        }

        .info-panel.active {
            opacity: 1;
            transform: translateY(0);
        }

        .info-panel h3 {
            margin: 0 0 10px 0;
            color: var(--glow-color, var(--text-color));
            font-weight: 300;
            letter-spacing: 1px;
        }

        .info-panel p {
            margin: 0;
            font-size: 0.95rem;
            line-height: 1.5;
        }

    </style>
</head>
<body>

    <!-- Dynamic Asymmetrical Starfield -->
    <div id="starfield"></div>

    <!-- Intro Sequence Layer -->
    <div id="intro-screen">
        <div id="intro-message" onclick="startJourney()">Click Here To Start Your Journey</div>
    </div>

    <!-- Main App Layer -->
    <div id="main-app">
        <div class="nav-header">
            <h1 id="mainTitle">THE INFINITE GAME</h1>
            <div class="nav-hint" id="navHint" style="opacity: 0;">Click Center Core to Zoom Out</div>
        </div>

        <div id="fractal-viewport">
            <!-- Dynamically Injected -->
        </div>

        <div class="info-panel" id="infoPanel">
            <h3 id="infoTitle">Title</h3>
            <p id="infoDesc">Description</p>
        </div>
    </div>

    <script>
        // 1. Asymmetrical Randomness for BG Color & Stars
        const isWhiteMode = Math.random() > 0.5;
        const root = document.documentElement;

        if (isWhiteMode) {
            root.style.setProperty('--bg-color', '#ffffff');
            root.style.setProperty('--text-color', '#000000');
            root.style.setProperty('--blend-mode', 'multiply'); 
            root.style.setProperty('--core-center', '#000000');
            root.style.setProperty('--core-mid', '#4dc4ff');
            root.style.setProperty('--panel-bg', 'rgba(240, 240, 255, 0.85)');
        } else {
            root.style.setProperty('--bg-color', '#000000');
            root.style.setProperty('--text-color', '#ffffff');
            root.style.setProperty('--blend-mode', 'screen'); 
            root.style.setProperty('--core-center', '#ffffff');
            root.style.setProperty('--core-mid', '#1e3a8a');
            root.style.setProperty('--panel-bg', 'rgba(20, 20, 40, 0.85)');
        }

        // Generate asymmetrical random stars
        const starfield = document.getElementById('starfield');
        const starColor = isWhiteMode ? '#333' : '#fff';
        for(let i = 0; i < 150; i++) {
            let star = document.createElement('div');
            star.style.position = 'absolute';
            star.style.left = (Math.random() * 100) + '%';
            star.style.top = (Math.random() * 100) + '%';
            let size = Math.random() * 3 + 0.5;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.backgroundColor = starColor;
            star.style.opacity = Math.random();
            star.style.borderRadius = '50%';
            starfield.appendChild(star);
        }

        // 2. Intro Sequence Logic
        setTimeout(() => {
            document.getElementById('intro-message').classList.add('visible');
        }, 3140);

        function startJourney() {
            const intro = document.getElementById('intro-screen');
            intro.style.opacity = '0';
            intro.style.visibility = 'hidden';

            const mainApp = document.getElementById('main-app');
            mainApp.classList.add('active');
        }


        // --- HOLONIC BROWSER LOGIC ---
        const nodeData = {
            north: { title: "ENTucationX", color: "#8b5cf6", desc: "Gateway of Learning. Transform curriculum into a hero's journey." },
            ne: { title: "Innovation Node", color: "#ec4899", desc: "Bridge: Learning & Connection. AR & MultiVRse tech." },
            east: { title: "CommUnityX", color: "#ef4444", desc: "Gateway of Connection. Family, legacy, and global villages." },
            se: { title: "Expression Node", color: "#f97316", desc: "Bridge: Connection & Healing. Art, story, and TTimecapsules." },
            south: { title: "WEllnessX", color: "#eab308", desc: "Gateway of Healing. Biofeedback, longevity, and regeneration." },
            sw: { title: "Resolution Node", color: "#22c55e", desc: "Bridge: Healing & Prosperity. Regen Campus & ecology." },
            west: { title: "BeISnessX", color: "#06b6d4", desc: "Gateway of Prosperity. AI-IA tools and CoOpoly franchises." },
            nw: { title: "Creation Node", color: "#3b82f6", desc: "Bridge: Prosperity & Learning. PACreator DAO." }
        };

        const origins = {
            north: "50% 34%",
            ne: "61.32% 38.68%",
            east: "66% 50%",
            se: "61.32% 61.32%",
            south: "50% 66%",
            sw: "38.68% 61.32%",
            west: "34% 50%",
            nw: "38.68% 38.68%",
            center: "50% 50%"
        };

        const viewport = document.getElementById('fractal-viewport');
        const mainTitle = document.getElementById('mainTitle');
        const navHint = document.getElementById('navHint');
        const infoPanel = document.getElementById('infoPanel');
        const infoTitle = document.getElementById('infoTitle');
        const infoDesc = document.getElementById('infoDesc');

        let historyStack = [];

        function createLayerHTML(id, stateClass) {
            return `
            <div class="holonic-container ${stateClass}" id="${id}">
                <div class="outer-ring"></div>
                <div class="inner-mask"></div>
                <div class="edge-nodes-container">
                    <div class="edge-node en-1"></div><div class="edge-node en-2"></div>
                    <div class="edge-node en-3"></div><div class="edge-node en-4"></div>
                    <div class="edge-node en-5"></div><div class="edge-node en-6"></div>
                    <div class="edge-node en-7"></div><div class="edge-node en-8"></div>
                    <div class="edge-node en-9"></div><div class="edge-node en-10"></div>
                    <div class="edge-node en-11"></div><div class="edge-node en-12"></div>
                    <div class="edge-node en-13"></div><div class="edge-node en-14"></div>
                    <div class="edge-node en-15"></div><div class="edge-node en-16"></div>
                </div>
                <div class="petals-container">
                    <div class="petal p-north" onmouseover="showInfo('north')" onmouseout="hideInfo()" onclick="zoomIn('north')"></div>
                    <div class="petal p-ne" onmouseover="showInfo('ne')" onmouseout="hideInfo()" onclick="zoomIn('ne')"></div>
                    <div class="petal p-east" onmouseover="showInfo('east')" onmouseout="hideInfo()" onclick="zoomIn('east')"></div>
                    <div class="petal p-se" onmouseover="showInfo('se')" onmouseout="hideInfo()" onclick="zoomIn('se')"></div>
                    <div class="petal p-south" onmouseover="showInfo('south')" onmouseout="hideInfo()" onclick="zoomIn('south')"></div>
                    <div class="petal p-sw" onmouseover="showInfo('sw')" onmouseout="hideInfo()" onclick="zoomIn('sw')"></div>
                    <div class="petal p-west" onmouseover="showInfo('west')" onmouseout="hideInfo()" onclick="zoomIn('west')"></div>
                    <div class="petal p-nw" onmouseover="showInfo('nw')" onmouseout="hideInfo()" onclick="zoomIn('nw')"></div>
                </div>
                <div class="center-core" onclick="zoomOut()"></div>
            </div>`;
        }

        viewport.innerHTML = createLayerHTML('layer-0', 'state-active');

        function zoomIn(nodeId) {
            hideInfo();
            const data = nodeData[nodeId];

            const oldLayerId = `layer-${historyStack.length}`;
            const newLayerId = `layer-${historyStack.length + 1}`;

            const activeLayer = document.getElementById(oldLayerId);
            activeLayer.style.transformOrigin = origins[nodeId];
            activeLayer.className = 'holonic-container state-zoomed-in';

            viewport.insertAdjacentHTML('beforeend', createLayerHTML(newLayerId, 'state-zoomed-out'));

            const newLayer = document.getElementById(newLayerId);
            void newLayer.offsetWidth; 

            newLayer.className = 'holonic-container state-active';

            const bgColor = getComputedStyle(document.documentElement).getPropertyValue('--bg-color').trim();
            newLayer.querySelector('.outer-ring').style.background = `conic-gradient(from 0deg, ${data.color}, ${bgColor}, ${data.color})`;

            historyStack.push(nodeId);

            // Only show the target node title (no tree)
            mainTitle.innerText = data.title;
            mainTitle.style.textShadow = `0 0 20px ${data.color}`;
            mainTitle.style.color = data.color;
            navHint.style.opacity = '1'; // Show instructions to zoom out

            setTimeout(() => {
                if(document.getElementById(oldLayerId) && document.getElementById(oldLayerId).classList.contains('state-zoomed-in')) {
                    document.getElementById(oldLayerId).style.display = 'none';
                }
            }, 4000); 
        }

        function zoomOut() {
            if (historyStack.length === 0) return; 

            hideInfo();

            const currentLayerId = `layer-${historyStack.length}`;
            const previousLayerId = `layer-${historyStack.length - 1}`;

            const currentLayer = document.getElementById(currentLayerId);
            currentLayer.style.transformOrigin = "50% 50%";
            currentLayer.className = 'holonic-container state-zoomed-out';

            const prevLayer = document.getElementById(previousLayerId);
            prevLayer.style.display = 'block';
            void prevLayer.offsetWidth;
            prevLayer.className = 'holonic-container state-active';

            setTimeout(() => {
                currentLayer.remove();
            }, 4000);

            historyStack.pop();

            if(historyStack.length === 0) {
                mainTitle.innerText = "THE INFINITE GAME";
                mainTitle.style.color = getComputedStyle(document.documentElement).getPropertyValue('--text-color').trim();
                mainTitle.style.textShadow = `0 0 15px ${mainTitle.style.color}`;
                navHint.style.opacity = '0'; // Hide hint at root
            } else {
                const parentNodeId = historyStack[historyStack.length - 1];
                mainTitle.innerText = nodeData[parentNodeId].title;
                mainTitle.style.color = nodeData[parentNodeId].color;
                mainTitle.style.textShadow = `0 0 20px ${nodeData[parentNodeId].color}`;
            }
        }

        function showInfo(nodeId) {
            const data = nodeData[nodeId];
            infoTitle.innerText = data.title;
            infoDesc.innerText = data.desc;
            infoPanel.style.setProperty('--glow-color', data.color);
            infoPanel.classList.add('active');
        }

        function hideInfo() {
            infoPanel.classList.remove('active');
        }
    </script>
</body>
</html>
