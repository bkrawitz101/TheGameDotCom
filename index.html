<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XtheGAME - Deep Fractal Holonic Browser</title>
    <style>
        :root {
            --bg-color: #000000; 
            --text-color: #ffffff; 
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            transition: background-color 2s ease;
            -webkit-tap-highlight-color: transparent; /* Removes default mobile tap flash */
        }

        /* --- DYNAMIC ASYMMETRICAL STARFIELD --- */
        #starfield {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* --- INTRO SCREEN STYLES --- */
        #intro-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            background-color: transparent; 
            transition: opacity 2s ease, visibility 2s;
        }

        #intro-message {
            opacity: 0;
            color: var(--text-color);
            font-size: clamp(1.2rem, 3vw, 2.5rem);
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            cursor: pointer;
            padding: 20px 40px;
            border: 1px solid transparent;
            transition: opacity 2s ease, border-color 0.5s, text-shadow 0.5s, transform 0.5s;
            text-align: center;
            z-index: 10000;
        }

        #intro-message.visible {
            opacity: 1;
        }

        #intro-message:hover {
            border-color: var(--text-color);
            text-shadow: 0 0 20px var(--text-color);
            transform: scale(1.05);
        }

        /* --- MAIN APP UI --- */
        #main-app {
            opacity: 0;
            visibility: hidden;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 3s ease, visibility 3s;
            position: absolute;
            top: 0; left: 0;
            z-index: 10;
        }

        #main-app.active {
            opacity: 1;
            visibility: visible;
        }

        /* Responsive adjustments for the full-screen modal */
        @media (max-width: 768px) {
            .modal-inner-content {
                padding: 20px; /* Reduced padding for mobile */
                width: 90%; /* Allow it to take more width */
                max-height: 90vh; /* Allow modal to take more vertical space */
            }

            .modal-close-btn {
                top: 10px;
                right: 15px;
                font-size: 30px;
            }

            /* Adjust iframe height to fit within the new modal padding */
            #modal-body iframe {
                height: calc(90vh - 40px); /* 90vh for modal max-height, minus 2*20px padding */
            }
        }


        .nav-header {
            position: absolute;
            top: 2%;
            width: 100%;
            text-align: center;
            z-index: 100;
            pointer-events: none; 
        }

        .nav-header h1 {
            margin: 0;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            text-shadow: 0 0 15px var(--text-color);
            color: var(--text-color);
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            transition: color 1s, text-shadow 1s;
        }

        .nav-hint {
            margin-top: 10px;
            color: #88c0d0;
            letter-spacing: 2px;
            font-size: 0.9rem;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .nav-hint.visible {
            opacity: 0.8;
        }

        /* The Main Viewport for Fractal Zooming */
        #fractal-viewport {
            position: relative;
            width: 80vmin; 
            height: 80vmin;
            max-width: 750px;
            max-height: 750px;
            margin-top: 5vh;
        }

        /* The Fractal Animation */
        .holonic-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transform-origin: center center; 
            transition: transform 4s cubic-bezier(0.4, 0.0, 0.2, 1), opacity 4s ease-in-out;
            will-change: transform, opacity;
        }

        .state-active {
            transform: scale(1) rotate(0deg);
            opacity: 1;
            pointer-events: auto;
            z-index: 10;
        }

        .state-zoomed-in {
            transform: scale(30) rotate(45deg);
            opacity: 0;
            pointer-events: none;
            z-index: 20;
        }

        .state-zoomed-out {
            transform: scale(0.01) rotate(-45deg);
            opacity: 0;
            pointer-events: none;
            z-index: 5;
        }

        /* Outer Rotating Gradient Ring */
        .outer-ring {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 0deg, 
                #8b5cf6, #ec4899, #ef4444, #f97316, 
                #eab308, #22c55e, #06b6d4, #3b82f6, #8b5cf6);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        /* Inner mask to hollow out the ring */
        .inner-mask {
            position: absolute;
            top: 4%; left: 4%; 
            width: 92%; height: 92%;
            border-radius: 50%;
            background-color: var(--bg-color);
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
            z-index: 5;
        }

        /* Orbiting Nodes on the Outer Ring (16 Nodes) */
        .edge-nodes-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 6;
        }

        .edge-node {
            position: absolute;
            width: 4.5%; 
            height: 4.5%;
            background: radial-gradient(circle at 30% 30%, #ffffff, #888888);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5), inset 0 0 5px #000;
            transform: translate(-50%, -50%);
            background-size: 170%; /* Made images a little smaller */
            background-position: center;
            background-repeat: no-repeat;
        }

        .en-1  { top: 4%; left: 50%; } .en-2  { top: 7.5%; left: 67.6%; }
        .en-3  { top: 17.47%; left: 82.53%; } .en-4  { top: 32.4%; left: 92.5%; }
        .en-5  { top: 50%; left: 96%; } .en-6  { top: 67.6%; left: 92.5%; }
        .en-7  { top: 82.53%; left: 82.53%; } .en-8  { top: 92.5%; left: 67.6%; }
        .en-9  { top: 96%; left: 50%; } .en-10 { top: 92.5%; left: 32.4%; }
        .en-11 { top: 82.53%; left: 17.47%; } .en-12 { top: 67.6%; left: 7.5%; }
        .en-13 { top: 50%; left: 4%; } .en-14 { top: 32.4%; left: 7.5%; }
        .en-5 { background-image: url('Images/east.png'); }
        .en-1 { background-image: url('Images/north.png'); }
        .en-9 { background-image: url('Images/south.png'); }
        .en-13 { background-image: url('Images/west.png'); }
        .en-15 { top: 17.47%; left: 17.47%; } .en-16 { top: 7.5%; left: 32.4%; }

        /* The Petals Container */
        .petals-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 50%;
            z-index: 10;
        }

        .petal {
            position: absolute;
            width: 21%; height: 21%; 
            border-radius: 50%;
            mix-blend-mode: var(--blend-mode);
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0.85;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 
           Desktop Hover Effect 
           Only applies if device supports true hover (no lag on mobile)
        */
        @media (hover: hover) and (pointer: fine) {
            .petal:hover {
                transform: scale(1.15);
                z-index: 20;
                opacity: 1;
                box-shadow: 0 0 40px currentColor;
            }
            .petal:hover::after {
                opacity: 1;
            }
        }

        /* 
           Mobile 2-Tap Focus Effect
           Triggered via JS when a user taps a node once
        */
        .petal.mobile-focused {
            transform: scale(1.15);
            z-index: 20;
            opacity: 1;
            box-shadow: 0 0 40px currentColor;
        }
        .petal.mobile-focused::after {
            opacity: 1;
        }

        .petal::after {
            content: "ZOOM";
            opacity: 0;
            color: #fff;
            font-size: 0.7rem;
            font-weight: bold;
            letter-spacing: 2px;
            transition: opacity 0.3s;
            text-shadow: 0 0 5px #000;
        }

        .p-north { top: 23.5%; left: 39.5%; background-color: #8b5cf6; color: #8b5cf6; } 
        .p-ne    { top: 28.18%; left: 50.82%; background-color: #ec4899; color: #ec4899; } 
        .p-east  { top: 39.5%; left: 55.5%; background-color: #ef4444; color: #ef4444; } 
        .p-se    { top: 50.82%; left: 50.82%; background-color: #f97316; color: #f97316; } 
        .p-south { top: 55.5%; left: 39.5%; background-color: #eab308; color: #eab308; } 
        .p-sw    { top: 50.82%; left: 28.18%; background-color: #22c55e; color: #22c55e; } 
        .p-west  { top: 39.5%; left: 23.5%; background-color: #06b6d4; color: #06b6d4; } 
        .p-nw    { top: 28.18%; left: 28.18%; background-color: #3b82f6; color: #3b82f6; } 

        /* Center Galaxy Core */
        .center-core {
            position: absolute;
            top: 36%; left: 36%;
            width: 28%; height: 28%;
            border-radius: 50%;
            background: radial-gradient(circle at center, var(--core-center) 0%, var(--core-mid) 25%, var(--bg-color) 70%);
            border: 5px dotted var(--text-color);
            box-shadow: 0 0 50px rgba(128, 128, 128, 0.4), inset 0 0 30px var(--core-mid);
            z-index: 30;
            cursor: pointer;
            transition: all 0.4s ease;
            animation: spinReverse 40s linear infinite;
        }

        .center-core:hover {
            transform: scale(1.05) rotate(-10deg);
            box-shadow: 0 0 80px rgba(128, 128, 128, 0.7), inset 0 0 40px #4dc4ff;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spinReverse { 100% { transform: rotate(-360deg); } }

        /* --- SMALL HOVER PREVIEW PANEL --- */
        .hover-preview-panel {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--panel-bg);
            border: 1px solid var(--glow-color, var(--text-color));
            padding: 12px 25px; 
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), 0 0 15px var(--glow-color, rgba(128, 128, 128, 0.2));
            backdrop-filter: blur(10px);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease; 
            z-index: 3000; 
            pointer-events: none;
            color: var(--text-color);
        }

        .hover-preview-panel.active {
            opacity: 1;
            transform: translateY(0);
        }

        .hover-preview-panel h3 {
            margin: 0; 
            color: var(--glow-color, var(--text-color));
            font-weight: 400;
            letter-spacing: 2px;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        /* --- THE BOTTOM CLICKABLE BOX (Visible only when zoomed in) --- */
        #layer-info-box {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--panel-bg);
            border: 1px solid var(--glow-color, var(--text-color));
            padding: 20px 40px;
            border-radius: 30px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px var(--glow-color, rgba(255,255,255,0.2));
            backdrop-filter: blur(15px);
            opacity: 0;
            z-index: 2000;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 80%;
            color: var(--text-color);
        }

        #layer-info-box.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        #layer-info-box:hover {
            transform: translateX(-50%) translateY(-5px) scale(1.02);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6), 0 0 30px var(--glow-color, rgba(255,255,255,0.4));
        }

        #layer-info-box h3 {
            margin: 0 0 5px 0;
            font-weight: 400;
            letter-spacing: 2px;
            color: var(--glow-color, var(--text-color));
            text-transform: uppercase;
        }

        #layer-info-box p {
            margin: 0 0 10px 0;
            font-size: 1rem;
            opacity: 0.9;
        }

        .click-hint {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
            animation: pulseHint 2s infinite;
        }

        @keyframes pulseHint {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* --- FULL SCREEN MODAL --- */
        #full-screen-modal {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s;
            backdrop-filter: blur(20px);
        }

        #full-screen-modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-inner-content {
            background: var(--panel-bg);
            border: 1px solid var(--glow-color, var(--text-color));
            padding: 60px;
            border-radius: 20px;
            max-width: 800px;
            width: 85%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 0 0 40px var(--glow-color, rgba(255,255,255,0.2));
            color: var(--text-color);
            transform: scale(0.9);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #full-screen-modal.active .modal-inner-content {
            transform: scale(1);
        }

        .modal-close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            cursor: pointer;
            color: var(--text-color);
            opacity: 0.6;
            transition: opacity 0.3s, transform 0.3s, color 0.3s;
            line-height: 1;
        }

        .modal-close-btn:hover {
            opacity: 1;
            transform: rotate(90deg);
            color: var(--glow-color, var(--text-color));
        }

        #modal-body h2 {
            margin-top: 0;
            color: var(--glow-color, var(--text-color));
            letter-spacing: 3px;
            font-weight: 300;
            font-size: 2.5rem;
            border-bottom: 1px solid rgba(128,128,128,0.3);
            padding-bottom: 15px;
        }

        #modal-body p {
            font-size: 1.15rem;
            line-height: 1.8;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        /* Custom Scrollbar for Modal */
        .modal-inner-content::-webkit-scrollbar { width: 8px; }
        .modal-inner-content::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .modal-inner-content::-webkit-scrollbar-thumb { background: var(--glow-color, #888); border-radius: 10px; }

    </style>
</head>
<body>

    <!-- Dynamic Asymmetrical Starfield -->
    <div id="starfield"></div>

    <!-- Intro Sequence Layer -->
    <div id="intro-screen">
        <div id="intro-message" onclick="startJourney()">Click Here To Start Your Journey</div>
    </div>

    <!-- Main App Layer -->
    <div id="main-app">
        <div class="nav-header">
            <h1 id="mainTitle">THE INFINITE GAME</h1>
            <div class="nav-hint" id="navHint">Tap/Click Center Core to Zoom Out</div>
        </div>

        <div id="fractal-viewport">
            <!-- Dynamically Injected -->
        </div>

        <!-- Small Hover Preview Pill (Visible at Root / Hover) -->
        <div class="hover-preview-panel" id="hoverPreview">
            <h3 id="hoverTitle">Title</h3>
        </div>

        <!-- The Clickable Bottom Box (Visible when Zoomed In) -->
        <div id="layer-info-box" onclick="openFullScreenModal()">
            <h3 id="layerBoxTitle">Title</h3>
            <p id="layerBoxDesc">Description</p>
            <div class="click-hint">Click here to eXplore full details</div>
        </div>

    <!-- Full Screen Modal -->
    <div id="full-screen-modal">
        <div class="modal-inner-content">
            <span class="modal-close-btn" onclick="closeFullScreenModal()">&times;</span>
            <div id="modal-body">
                <!-- Injected Full Text -->
            </div>
        </div>
    </div>

    <script>
        // 1. Asymmetrical Randomness for BG Color & Stars
        const isWhiteMode = Math.random() > 0.5;
        const root = document.documentElement;

        if (isWhiteMode) {
            root.style.setProperty('--bg-color', '#ffffff');
            root.style.setProperty('--text-color', '#000000');
            root.style.setProperty('--blend-mode', 'multiply'); 
            root.style.setProperty('--core-center', '#000000');
            root.style.setProperty('--core-mid', '#4dc4ff');
            root.style.setProperty('--panel-bg', 'rgba(240, 240, 255, 0.85)');
        } else {
            root.style.setProperty('--bg-color', '#000000');
            root.style.setProperty('--text-color', '#ffffff');
            root.style.setProperty('--blend-mode', 'screen'); 
            root.style.setProperty('--core-center', '#ffffff');
            root.style.setProperty('--core-mid', '#1e3a8a');
            root.style.setProperty('--panel-bg', 'rgba(20, 20, 40, 0.85)');
        }

        // Generate asymmetrical random stars
        const starfield = document.getElementById('starfield');
        const starColor = isWhiteMode ? '#333' : '#fff';
        for(let i = 0; i < 150; i++) {
            let star = document.createElement('div');
            star.style.position = 'absolute';
            star.style.left = (Math.random() * 100) + '%';
            star.style.top = (Math.random() * 100) + '%';
            let size = Math.random() * 3 + 0.5;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.backgroundColor = starColor;
            star.style.opacity = Math.random();
            star.style.borderRadius = '50%';
            starfield.appendChild(star);
        }

        // 2. Intro Sequence Logic
        setTimeout(() => {
            document.getElementById('intro-message').classList.add('visible');
        }, 3140);

        function startJourney() {
            const intro = document.getElementById('intro-screen');
            intro.style.opacity = '0';
            intro.style.visibility = 'hidden';

            const mainApp = document.getElementById('main-app');
            mainApp.classList.add('active');
        }

        const origins = {
            north: "50% 34%", ne: "61.32% 38.68%", east: "66% 50%", se: "61.32% 61.32%",
            south: "50% 66%", sw: "38.68% 61.32%", west: "34% 50%", nw: "38.68% 38.68%", center: "50% 50%"
        };

        const viewport = document.getElementById('fractal-viewport');
        const mainTitle = document.getElementById('mainTitle');
        const navHint = document.getElementById('navHint');

        const hoverPreview = document.getElementById('hoverPreview');
        const hoverTitle = document.getElementById('hoverTitle');

        const layerInfoBox = document.getElementById('layer-info-box');
        const layerBoxTitle = document.getElementById('layerBoxTitle');
        const layerBoxDesc = document.getElementById('layerBoxDesc');

        const fullScreenModal = document.getElementById('full-screen-modal');
        const modalBody = document.getElementById('modal-body');

        let historyStack = [];
        let currentNode = null;
        let layerBoxTimeout;

        // --- 3. MOBILE & TOUCH LOGIC ---
        // We detect touch devices reliably to enable the 2-tap system
        let isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        let mobileFocusedNode = null; // Tracks which node is highlighted on tap 1

        function createLayerHTML(id, stateClass) {
            return `
            <div class="holonic-container ${stateClass}" id="${id}">
                <div class="outer-ring"></div>
                <div class="inner-mask"></div>
                <div class="edge-nodes-container">
                    <div class="edge-node en-1"></div><div class="edge-node en-2"></div>
                    <div class="edge-node en-3"></div><div class="edge-node en-4"></div>
                    <div class="edge-node en-5"></div><div class="edge-node en-6"></div>
                    <div class="edge-node en-7"></div><div class="edge-node en-8"></div>
                    <div class="edge-node en-9"></div><div class="edge-node en-10"></div>
                    <div class="edge-node en-11"></div><div class="edge-node en-12"></div>
                    <div class="edge-node en-13"></div><div class="edge-node en-14"></div>
                    <div class="edge-node en-15"></div><div class="edge-node en-16"></div>
                </div>
                <div class="petals-container">
                    <div class="petal p-north" onmouseenter="handleMouseEnter('north')" onmouseleave="handleMouseLeave()" onclick="handlePetalClick(event, 'north')"></div>
                    <div class="petal p-ne" onmouseenter="handleMouseEnter('ne')" onmouseleave="handleMouseLeave()" onclick="handlePetalClick(event, 'ne')"></div>
                    <div class="petal p-east" onmouseenter="handleMouseEnter('east')" onmouseleave="handleMouseLeave()" onclick="handlePetalClick(event, 'east')"></div>
                    <div class="petal p-se" onmouseenter="handleMouseEnter('se')" onmouseleave="handleMouseLeave()" onclick="handlePetalClick(event, 'se')"></div>
                    <div class="petal p-south" onmouseenter="handleMouseEnter('south')" onmouseleave="handleMouseLeave()" onclick="handlePetalClick(event, 'south')"></div>
                    <div class="petal p-sw" onmouseenter="handleMouseEnter('sw')" onmouseleave="handleMouseLeave()" onclick="handlePetalClick(event, 'sw')"></div>
                    <div class="petal p-west" onmouseenter="handleMouseEnter('west')" onmouseleave="handleMouseLeave()" onclick="handlePetalClick(event, 'west')"></div>
                    <div class="petal p-nw" onmouseenter="handleMouseEnter('nw')" onmouseleave="handleMouseLeave()" onclick="handlePetalClick(event, 'nw')"></div>
                </div>
                <div class="center-core" onclick="zoomOut()"></div>
            </div>`;
        }

        viewport.innerHTML = createLayerHTML('layer-0', 'state-active');

        // MOUSE EVENTS (Desktop Only)
        function handleMouseEnter(nodeId) {
            if (isTouchDevice) return; // Prevent duplicate execution on touch
            showHover(nodeId);
        }

        function handleMouseLeave() {
            if (isTouchDevice) return;
            hideHover();
        }

        // CLICK & TAP EVENTS
        function handlePetalClick(event, nodeId) {
            if (isTouchDevice) {
                // Mobile (2-tap system)
                if (nodeId === 'ne') { // Special handling for the magenta node (Innovation Node)
                    event.preventDefault(); // Prevent default browser behavior (like zooming)
                    if (mobileFocusedNode !== nodeId) {
                        // Tap 1 on mobile for 'ne': Focus & Show Pill
                        clearMobileFocus();
                        mobileFocusedNode = nodeId;
                        event.currentTarget.classList.add('mobile-focused');
                        showHover(nodeId);
                    } else {
                        // Tap 2 on mobile for 'ne': Zoom In (then video will play)
                        mobileFocusedNode = null; // Clear mobile focus if it was set
                        clearMobileFocus();
                        zoomIn(nodeId); // Call zoomIn, which will then trigger playPromoVideo
                    }
                } else if (mobileFocusedNode !== nodeId) { // First tap on any other node
                    event.preventDefault();
                    clearMobileFocus();
                    mobileFocusedNode = nodeId;
                    event.currentTarget.classList.add('mobile-focused');
                    showHover(nodeId);
                } else { // Second tap on any other node: Zoom In
                    mobileFocusedNode = null;
                    clearMobileFocus();
                    zoomIn(nodeId);
                }
            } else {
                // Desktop Click
                // Always zoom in for 'ne', and the video will be triggered by zoomIn
                zoomIn(nodeId);
            }
        }

        // Tap outside on mobile clears the focus
        document.addEventListener('touchstart', function(e) {
            if (!e.target.classList.contains('petal')) {
                if (mobileFocusedNode) {
                    mobileFocusedNode = null;
                    clearMobileFocus();
                    hideHover();
                }
            }
        }, {passive: true});

        function clearMobileFocus() {
            document.querySelectorAll('.petal').forEach(p => p.classList.remove('mobile-focused'));
        }

        // --- VISUAL & ANIMATION LOGIC ---
        function showHover(nodeId) {
            const data = nodeData[nodeId];
            hoverTitle.innerText = data.title;
            hoverPreview.style.setProperty('--glow-color', data.color);
            hoverPreview.classList.add('active');

            // Hide the main bottom banner immediately to prevent clutter
            layerInfoBox.classList.remove('visible');
        }

        function hideHover() {
            hoverPreview.classList.remove('active');

            // If we are deep in a node, bring the bottom banner back up smoothly
            if (historyStack.length > 0) {
                layerInfoBox.classList.add('visible');
            }
        }

        function zoomIn(nodeId) {
            hideHover(); 

            const data = nodeData[nodeId];
            currentNode = nodeId;

            const oldLayerId = `layer-${historyStack.length}`;
            const newLayerId = `layer-${historyStack.length + 1}`;

            const activeLayer = document.getElementById(oldLayerId);
            activeLayer.style.transformOrigin = origins[nodeId];
            activeLayer.className = 'holonic-container state-zoomed-in';

            viewport.insertAdjacentHTML('beforeend', createLayerHTML(newLayerId, 'state-zoomed-out'));

            const newLayer = document.getElementById(newLayerId);
            void newLayer.offsetWidth; 

            newLayer.className = 'holonic-container state-active';

            const bgColor = getComputedStyle(document.documentElement).getPropertyValue('--bg-color').trim();
            newLayer.querySelector('.outer-ring').style.background = `conic-gradient(from 0deg, ${data.color}, ${bgColor}, ${data.color})`;

            historyStack.push(nodeId);

            // UI Updates
            mainTitle.innerText = data.title;
            mainTitle.style.textShadow = `0 0 20px ${data.color}`;
            mainTitle.style.color = data.color;
            navHint.classList.add('visible');

            // Clear existing timeout and reset the bottom box content
            clearTimeout(layerBoxTimeout);
            layerBoxTitle.innerText = data.title;
            layerBoxDesc.innerText = data.desc;
            layerInfoBox.style.setProperty('--glow-color', data.color);

            // Delay showing the bottom box slightly for dramatic effect, UNLESS it's the 'ne' node
            if (nodeId !== 'ne') { // Only show layerInfoBox for non-'ne' nodes
                layerBoxTimeout = setTimeout(() => {
                    if (!hoverPreview.classList.contains('active')) {
                        layerInfoBox.classList.add('visible');
                    }
                }, 1000);
            } else {
                // Ensure layerInfoBox is hidden if 'ne' is clicked
                layerInfoBox.classList.remove('visible');
            }

            // Delay showing the bottom box slightly for dramatic effect
            layerBoxTimeout = setTimeout(() => {
                if (!hoverPreview.classList.contains('active')) {
                    layerInfoBox.classList.add('visible');
                }
            }, 1000);

            setTimeout(() => {
                if(document.getElementById(oldLayerId) && document.getElementById(oldLayerId).classList.contains('state-zoomed-in')) {
                    document.getElementById(oldLayerId).style.display = 'none';
                }
            }, 4000); 

            // Trigger video playback after zoom animation for 'ne' node
            if (nodeId === 'ne') {
                setTimeout(() => {
                    playPromoVideo();
                }, 3500); // Play video slightly before the old layer fully disappears
            }
        }

        function zoomOut() {
            mobileFocusedNode = null;
            clearMobileFocus();
            hideHover();
            clearTimeout(layerBoxTimeout);
            layerInfoBox.classList.remove('visible'); 

            if (historyStack.length === 0) return; 

            const currentLayerId = `layer-${historyStack.length}`;
            const previousLayerId = `layer-${historyStack.length - 1}`;

            const currentLayer = document.getElementById(currentLayerId);
            currentLayer.style.transformOrigin = "50% 50%";
            currentLayer.className = 'holonic-container state-zoomed-out';

            const prevLayer = document.getElementById(previousLayerId);
            prevLayer.style.display = 'block';
            void prevLayer.offsetWidth;
            prevLayer.className = 'holonic-container state-active';

            setTimeout(() => {
                currentLayer.remove();
            }, 4000);

            historyStack.pop();

            if(historyStack.length === 0) {
                currentNode = null;
                mainTitle.innerText = "THE INFINITE GAME";
                mainTitle.style.color = getComputedStyle(document.documentElement).getPropertyValue('--text-color').trim();
                mainTitle.style.textShadow = `0 0 15px ${mainTitle.style.color}`;
                navHint.classList.remove('visible');
            } else {
                currentNode = historyStack[historyStack.length - 1];
                const parentData = nodeData[currentNode];
                mainTitle.innerText = parentData.title;
                mainTitle.style.color = parentData.color;
                mainTitle.style.textShadow = `0 0 20px ${parentData.color}`;

                // Re-populate and show bottom box for the new parent layer
                layerBoxTitle.innerText = parentData.title;
                layerBoxDesc.innerText = parentData.desc;
                layerInfoBox.style.setProperty('--glow-color', parentData.color);
                layerBoxTimeout = setTimeout(() => {
                    if (!hoverPreview.classList.contains('active')) {
                        layerInfoBox.classList.add('visible');
                    }
                }, 1000);
            }
        }

        // --- FULL SCREEN MODAL LOGIC ---
        function openFullScreenModal() {
            if(!currentNode) return;

            // If a video is playing, don't open the modal for text content
            if (fullScreenModal.dataset.currentVideo === 'true') {
                return;
            }

            // Otherwise, open modal with text content
            const data = nodeData[currentNode];

            modalBody.innerHTML = data.fullText;
            fullScreenModal.style.setProperty('--glow-color', data.color);
            fullScreenModal.classList.add('active');
        }

        function closeFullScreenModal() {
            fullScreenModal.classList.remove('active');
        }

        // Function to play the promo video
        function playPromoVideo() {
            console.log('Attempting to play promo video: Videos/X—THE GAME™ Promo video.mp4');
            // Clear any existing content in the modal body
            modalBody.innerHTML = '';

            try {
                // Create video element
                const videoElement = document.createElement('video');
                videoElement.src = 'Videos/X—THE GAME™ Promo video.mp4';
            videoElement.controls = true; videoElement.muted = true; // Show video controls, and mute by default for autoplay
                videoElement.autoplay = true; // Autoplay the video
                videoElement.style.width = '100%';
                videoElement.style.height = 'auto';
                videoElement.style.display = 'block'; // Ensure it takes up space
                videoElement.style.maxWidth = '100%'; // Ensure video fits within modal
                videoElement.style.maxHeight = 'calc(80vh - 120px)'; // Adjust based on modal padding

                // Add event listeners for debugging
                videoElement.addEventListener('error', (e) => {
                    console.error('Video playback error:', e);
                    console.error('Video source:', videoElement.src);
                    modalBody.innerHTML = '<p style="color: red;">Error loading video. Please check the file path and format.</p>';
                });
                videoElement.addEventListener('loadedmetadata', () => { console.log('Video metadata loaded successfully.'); });
                videoElement.addEventListener('play', () => { console.log('Video started playing.'); });
                videoElement.addEventListener('pause', () => { console.log('Video paused.'); });

                // Append video to modal body
                modalBody.appendChild(videoElement);

                // Set a glow color for the modal (e.g., from the 'ne' node)
                fullScreenModal.style.setProperty('--glow-color', nodeData.ne.color);

                // Show modal
                fullScreenModal.classList.add('active');

                // Store the video element reference to pause it later
                fullScreenModal.dataset.currentVideo = 'true'; // A flag to indicate video is playing
            } catch (error) {
                console.error('Error creating or playing video element:', error);
                modalBody.innerHTML = '<p style="color: red;">An unexpected error occurred while trying to play the video.</p>';
            }
        }

    </script>
</body>
</html>
