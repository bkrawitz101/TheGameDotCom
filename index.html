<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XtheGAME - Deep Fractal Holonic Browser</title>
    <style>
        :root {
            --bg-color: #000000; 
            --text-color: #ffffff; 
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            transition: background-color 2s ease;
            -webkit-tap-highlight-color: transparent; /* Removes default mobile tap flash */
        }

        /* --- DYNAMIC ASYMMETRICAL STARFIELD --- */
        #starfield {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* --- INTRO SCREEN STYLES --- */
        #intro-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            background-color: transparent; 
            transition: opacity 2s ease, visibility 2s;
        }

        #intro-message {
            opacity: 0;
            color: var(--text-color);
            font-size: clamp(1.2rem, 3vw, 2.5rem);
            font-weight: 300;
            letter-spacing: 6px;
            cursor: pointer;
            padding: 20px 40px;
            border: 1px solid transparent;
            transition: opacity 2s ease, border-color 0.5s, text-shadow 0.5s, transform 0.5s;
            text-align: center;
            z-index: 10000;
        }

        #intro-message.visible {
            opacity: 1;
        }

        #intro-message:hover {
            border-color: var(--text-color);
            text-shadow: 0 0 20px var(--text-color);
            transform: scale(1.05);
        }

        /* --- MAIN APP UI --- */
        #main-app {
            opacity: 0;
            visibility: hidden;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 3s ease, visibility 3s;
            position: absolute;
            top: 0; left: 0;
            z-index: 10;
        }

        #main-app.active {
            opacity: 1;
            visibility: visible;
        }

        .nav-header {
            position: absolute;
            top: 2%;
            width: 100%;
            text-align: center;
            z-index: 100;
            pointer-events: none; 
        }

        .nav-header h1 {
            margin: 0;
            font-weight: 300;
            letter-spacing: 8px;
            text-shadow: 0 0 15px var(--text-color);
            color: var(--text-color);
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            transition: color 1s, text-shadow 1s;
        }

        .nav-hint {
            margin-top: 10px;
            color: #88c0d0;
            letter-spacing: 2px;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .nav-hint.visible {
            opacity: 0.8;
        }

        /* --- HAND HISTORY PANEL & ICON --- */
        #hand-history-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 3000;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            backdrop-filter: blur(10px);
        }
        #hand-history-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }
        
        #hand-history-panel {
            position: fixed;
            top: 0; left: -320px;
            width: 320px;
            height: 100vh;
            background: var(--panel-bg);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 3100;
            transition: left 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            padding: 25px 20px;
            box-sizing: border-box;
            color: var(--text-color);
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        #hand-history-panel.open { left: 0; }
        
        .hand-history-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 15px; margin-bottom: 20px;
        }
        .hand-history-header h3 { margin: 0; font-weight: 300; letter-spacing: 3px; text-transform: uppercase; }
        .hand-history-header span { font-size: 28px; cursor: pointer; opacity: 0.7; transition: opacity 0.3s; line-height: 1; }
        .hand-history-header span:hover { opacity: 1; }
        
        #hand-history-grid {
            flex-grow: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 15px; align-content: start; padding-right: 5px;
        }
        #hand-history-grid::-webkit-scrollbar { width: 6px; }
        #hand-history-grid::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
        #hand-history-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }
        
        .history-card {
            width: 100%; aspect-ratio: 2.5 / 3.5; background-size: cover; background-position: center;
            border-radius: 8px; border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4); transition: transform 0.3s;
        }
        .history-card:hover { transform: scale(1.05); border-color: #fff; z-index: 2; }
        
        @media (max-width: 768px) {
            #hand-history-panel { width: 85vw; left: -85vw; }
            #hand-history-btn { top: 10px; left: 10px; width: 45px; height: 45px; font-size: 20px; }
        }

        /* --- PLACEMENT BOARD --- */
        #placement-board-modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.9); z-index: 100000;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: opacity 0.4s;
            backdrop-filter: blur(20px);
        }
        #placement-board-modal.active { opacity: 1; visibility: visible; }
        .placement-board-inner {
            background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.3);
            border-radius: 20px; padding: 25px 40px; text-align: center;
            max-width: 800px; width: 90%; color: var(--text-color);
            position: relative; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }
        #placement-fractal {
            position: relative; width: 55vmin; height: 55vmin; 
            max-width: 450px; max-height: 450px; margin: 15px auto;
            cursor: crosshair;
        }
        .placed-card {
            position: absolute; width: 10.5%; aspect-ratio: 1; background-size: cover;
            background-position: center; border-radius: 50%;
            transform: translate(-50%, -50%); z-index: 100; pointer-events: auto; cursor: grab;
        }
        .placed-card:active { cursor: grabbing; }
        #placement-hand { display: flex; gap: 10px; justify-content: center; overflow-x: auto; padding: 10px; }
        .placement-hand-card {
            width: 80px; height: 112px; background-size: cover; background-position: center;
            border-radius: 5px; cursor: pointer; border: 2px solid transparent;
            transition: transform 0.2s; flex-shrink: 0;
        }
        .placement-hand-card.selected { border-color: #4dc4ff; transform: scale(1.1); box-shadow: 0 0 15px #4dc4ff; }

        /* The Main Viewport for Fractal Zooming */
        #fractal-viewport {
            position: relative;
            width: 80vmin; 
            height: 80vmin;
            max-width: 750px;
            max-height: 750px;
            margin-top: 5vh;
        }

        /* The Fractal Animation */
        .holonic-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transform-origin: center center; 
            transition: transform 4s cubic-bezier(0.4, 0.0, 0.2, 1), opacity 4s ease-in-out;
            will-change: transform, opacity;
        }

        .state-active {
            transform: scale(1) rotate(0deg);
            opacity: 1;
            pointer-events: auto;
            z-index: 10;
        }

        .state-zoomed-in {
            transform: scale(30) rotate(45deg);
            opacity: 0;
            pointer-events: none;
            z-index: 20;
        }

        .state-zoomed-out {
            transform: scale(0.01) rotate(-45deg);
            opacity: 0;
            pointer-events: none;
            z-index: 5;
        }

        /* Ensure pointer events are completely disabled on zooming/zoomed out layers */
        .state-zoomed-in *, .state-zoomed-out * {
            pointer-events: none !important;
        }

        /* Outer Rotating Gradient Ring */
        .outer-ring {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 50%;
            background: conic-gradient(from -22.5deg, 
                #8b5cf6, #ec4899, #ef4444, #f97316, 
                #eab308, #22c55e, #06b6d4, #3b82f6, #8b5cf6);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        /* Inner mask to hollow out the ring */
        .inner-mask {
            position: absolute;
            top: 4%; left: 4%; 
            width: 92%; height: 92%;
            border-radius: 50%;
            background-color: var(--bg-color);
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
            z-index: 5;
        }

        /* Orbiting Nodes on the Outer Ring (16 Nodes) */
        .edge-nodes-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 6;
        }

        .edge-node {
            position: absolute;
            width: 4.5%; 
            height: 4.5%;
            background: radial-gradient(circle at 30% 30%, #ffffff, #888888);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5), inset 0 0 5px #000;
            transform: translate(-50%, -50%);
            background-size: 170%; /* Made images a little smaller */
            background-position: center;
            background-repeat: no-repeat;
            transition: transform 0.3s ease, box-shadow 0.3s ease, z-index 0.3s;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color); /* Default fallback for the glow */
        }

        .en-1  { top: 4%; left: 50%; } .en-2  { top: 7.5%; left: 67.6%; }
        .en-3  { top: 17.47%; left: 82.53%; } .en-4  { top: 32.4%; left: 92.5%; }
        .en-5  { top: 50%; left: 96%; } .en-6  { top: 67.6%; left: 92.5%; }
        .en-7  { top: 82.53%; left: 82.53%; } .en-8  { top: 92.5%; left: 67.6%; }
        .en-9  { top: 96%; left: 50%; } .en-10 { top: 92.5%; left: 32.4%; }
        .en-11 { top: 82.53%; left: 17.47%; } .en-12 { top: 67.6%; left: 7.5%; }
        .en-13 { top: 50%; left: 4%; } .en-14 { top: 32.4%; left: 7.5%; }
        .en-15 { top: 17.47%; left: 17.47%; } .en-16 { top: 7.5%; left: 32.4%; }
        
        .en-1 { background-image: url('Images/north.png'); color: #8b5cf6; }
        .en-5 { background-image: url('Images/east.png'); color: #ef4444; }
        .en-9 { background-image: url('Images/south.png'); color: #eab308; }
        .en-13 { background-image: url('Images/west.png'); color: #06b6d4; }

        .en-1, .en-5, .en-9, .en-13 {
            width: 10.5% !important;
            height: 10.5% !important;
            cursor: pointer !important;
        }

        /* Mobile 2-Tap Focus Effect for edge-nodes */
        .edge-node.mobile-focused {
            transform: translate(-50%, -50%) scale(1.5);
            box-shadow: 0 0 40px currentColor, inset 0 0 10px #fff;
            z-index: 20; /* Bring to front */
        }

        /* Desktop Hover Effect for edge-nodes */
        .edge-node:hover, .edge-node.hovered {
                transform: translate(-50%, -50%) scale(1.5);
                box-shadow: 0 0 40px currentColor, inset 0 0 10px #fff;
                z-index: 20;
            }

        /* The Petals Container */
        .petals-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 50%;
            z-index: 10;
            pointer-events: none;
}

        .petal {
            position: absolute;
            width: 21%; height: 21%; 
            border-radius: 50%;
            mix-blend-mode: var(--blend-mode);
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0.85;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
}

        /* 
           Desktop Hover Effect 
           Only applies if device supports true hover (no lag on mobile)
        */
        @media (hover: hover) and (pointer: fine) {
            .petal:hover {
                transform: scale(1.15);
                z-index: 20;
                opacity: 1;
                box-shadow: 0 0 40px currentColor;
            }
        }

        /* 
           Mobile 2-Tap Focus Effect
           Triggered via JS when a user taps a node once
        */
        .petal.mobile-focused {
            transform: scale(1.15);
            z-index: 20;
            opacity: 1;
            box-shadow: 0 0 40px currentColor;
        }

        .p-north { top: 19%; left: 31%; background-color: #8b5cf6; color: #8b5cf6; } /* Purple @ 11:00 */
        .p-ne    { top: 19%; left: 48%; background-color: #ec4899; color: #ec4899; } /* Magenta @ 1:00 */
        .p-east  { top: 31%; left: 60%; background-color: #ef4444; color: #ef4444; } /* Red */
        .p-se    { top: 48%; left: 60%; background-color: #f97316; color: #f97316; } /* Orange */
        .p-south { top: 60%; left: 48%; background-color: #eab308; color: #eab308; } /* Yellow */
        .p-sw    { top: 60%; left: 31%; background-color: #22c55e; color: #22c55e; } /* Green */
        .p-west  { top: 48%; left: 19%; background-color: #06b6d4; color: #06b6d4; } /* Cyan */
        .p-nw    { top: 31%; left: 19%; background-color: #3b82f6; color: #3b82f6; } /* Blue */

        /* Center Galaxy Core */
        .center-core {
            position: absolute;
            top: 36%; left: 36%;
            width: 28%; height: 28%;
            border-radius: 50%;
            background: radial-gradient(circle at center, var(--core-center) 0%, var(--core-mid) 25%, var(--bg-color) 70%);
            border: 5px dotted var(--text-color);
            box-shadow: 0 0 50px rgba(128, 128, 128, 0.4), inset 0 0 30px var(--core-mid);
            z-index: 30;
            cursor: pointer;
            transition: all 0.4s ease;
            animation: spinReverse 40s linear infinite;
        }

        .center-core:hover {
            transform: scale(1.05) rotate(-10deg);
            box-shadow: 0 0 80px rgba(128, 128, 128, 0.7), inset 0 0 40px #4dc4ff;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spinReverse { 100% { transform: rotate(-360deg); } }

        /* --- SMALL HOVER PREVIEW PANEL --- */
        .hover-preview-panel {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--panel-bg);
            border: 1px solid var(--glow-color, var(--text-color));
            padding: 12px 25px; 
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), 0 0 15px var(--glow-color, rgba(128, 128, 128, 0.2));
            backdrop-filter: blur(10px);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease; 
            z-index: 3000; 
            pointer-events: none;
            color: var(--text-color);
        }

        .hover-preview-panel.active {
            opacity: 1;
            transform: translateY(0);
        }

        .hover-preview-panel h3 {
            margin: 0; 
            color: var(--glow-color, var(--text-color));
            font-weight: 400;
            letter-spacing: 2px;
            font-size: 1.1rem;
        }

        /* --- THE BOTTOM CLICKABLE BOX (Visible only when zoomed in) --- */
        #layer-info-box {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--panel-bg);
            border: 1px solid var(--glow-color, var(--text-color));
            padding: 20px 40px;
            border-radius: 30px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px var(--glow-color, rgba(255,255,255,0.2));
            backdrop-filter: blur(15px);
            opacity: 0;
            z-index: 2000;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 80%;
            color: var(--text-color);
        }

        #layer-info-box.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        #layer-info-box:hover {
            transform: translateX(-50%) translateY(-5px) scale(1.02);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6), 0 0 30px var(--glow-color, rgba(255,255,255,0.4));
        }

        #layer-info-box h3 {
            margin: 0 0 5px 0;
            font-weight: 400;
            letter-spacing: 2px;
            color: var(--glow-color, var(--text-color));
        }

        #layer-info-box p {
            margin: 0 0 10px 0;
            font-size: 1rem;
            opacity: 0.9;
        }

        .click-hint {
            font-size: 0.75rem;
            letter-spacing: 2px;
            opacity: 0.6;
            animation: pulseHint 2s infinite;
        }

        /* --- Mobile-Specific Adjustments --- */
        @media (max-width: 768px) {
            #layer-info-box {
                width: 90%;
                max-width: 90vw;
                padding: 15px 20px;
                bottom: 20px;
                border-radius: 20px;
            }
            #layer-info-box h3 {
                font-size: 1rem;
                margin-bottom: 4px;
            }
            #layer-info-box p {
                font-size: 0.9rem;
                margin-bottom: 8px;
            }
            .click-hint { font-size: 0.7rem; }
        }

        /* --- FULL SCREEN MODAL --- */
        #full-screen-modal {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s;
            backdrop-filter: blur(20px);
        }

        #full-screen-modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-inner-content {
            background: var(--panel-bg);
            border: 1px solid var(--glow-color, var(--text-color));
            padding: 60px;
            border-radius: 20px;
            max-width: 800px;
            width: 85%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 0 0 40px var(--glow-color, rgba(255,255,255,0.2));
            color: var(--text-color);
            transform: scale(0.9);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #full-screen-modal.active .modal-inner-content {
            transform: scale(1);
        }

        .modal-close-btn {
            position: sticky;
            top: 20px;
            float: right;
            margin-top: -40px;
            margin-right: -30px;
            z-index: 10000;
            font-size: 40px;
            cursor: pointer;
            color: var(--text-color);
            opacity: 0.6;
            transition: opacity 0.3s, transform 0.3s, color 0.3s;
            line-height: 1;
        }

        .modal-close-btn:hover {
            opacity: 1;
            transform: rotate(90deg);
            color: var(--glow-color, var(--text-color));
        }

        #modal-body h2 {
            margin-top: 0;
            color: var(--glow-color, var(--text-color));
            letter-spacing: 3px;
            font-weight: 300;
            font-size: 2.5rem;
            border-bottom: 1px solid rgba(128,128,128,0.3);
            padding-bottom: 15px;
        }

        #modal-body p {
            font-size: 1.15rem;
            line-height: 1.8;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        /* Custom Scrollbar for Modal */
        .modal-inner-content::-webkit-scrollbar { width: 8px; }
        .modal-inner-content::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .modal-inner-content::-webkit-scrollbar-thumb { background: var(--glow-color, #888); border-radius: 10px; }

        /* Dynamically Injected Images */
        .content-image {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 20px auto;
            display: block;
        }

    </style>
</head>
<body>

    <!-- Dynamic Asymmetrical Starfield -->
    <div id="starfield"></div>

    <!-- Intro Sequence Layer -->
    <div id="intro-screen">
        <div id="intro-message" onclick="startJourney()">Click Here To Start Your Journey</div>
    </div>

    <!-- Main App Layer -->
    <div id="main-app">
        <div class="nav-header">
            <h1 id="mainTitle">THE INFINITE GAME</h1>
            <div class="nav-hint" id="navHint">Tap/Click Center Core to Zoom Out</div>
        </div>

        <div id="fractal-viewport">
            <!-- Dynamically Injected -->
        </div>

        <!-- Small Hover Preview Pill (Visible at Root / Hover) -->
        <div class="hover-preview-panel" id="hoverPreview">
            <h3 id="hoverTitle">Title</h3>
        </div>

        <!-- The Clickable Bottom Box (Visible when Zoomed In) -->
        <div id="layer-info-box" onclick="openFullScreenModal()">
            <h3 id="layerBoxTitle">Title</h3>
            <p id="layerBoxDesc">Description</p>
            <div class="click-hint" id="layerBoxHint">Click here to eXplore full details</div>
        </div>

        <!-- Hand Tracker Icon & Panel -->
        <div id="hand-history-btn" onclick="toggleHandHistory()">🎴</div>
        <div id="hand-history-panel">
            <div class="hand-history-header">
                <h3>Your Hand</h3>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <span onclick="openPlacementBoard()" title="Place Cards on Board" style="font-size: 24px;">🧩</span>
                    <span onclick="toggleHandHistory()">&times;</span>
                </div>
            </div>
            <div id="hand-history-grid">
                <!-- Dealt images injected here -->
            </div>
        </div>

    </div>

    <!-- Full Screen Modal -->
    <div id="full-screen-modal">
        <div class="modal-inner-content">
            <span class="modal-close-btn" onclick="closeFullScreenModal()">&times;</span>
            <div id="modal-body">
                <!-- Injected Full Text -->
            </div>
        </div>
    </div>

        <!-- Placement Board Modal -->
        <div id="placement-board-modal">

                fullText: `<h2>OSX Beta Operating System for the Intentional Collision Of Ideas (ICOI)</h2>
                           <p>Creativity is a form of exploration. We take a journey, an excursion, beyond the boundaries of our everyday operational thinking and experience. We venture into unknown territories looking for new ideas because if we look where we’ve always been, we’ll find what we’ve always seen.</p>
                           <h3>Part I: The challenge of innovation</h3>
                           <p>More and more, we are hearing reports from our most technologically advanced companies regarding the innovation challenge.</p>
                           <p><a href="https://www.innovationexcellence.com/blog/2019/03/10/why-google-can-no-longer-innovate-according-to-a-13-year-veteran/" target="_blank">https://www.innovationexcellence.com/blog/2019/03/10/why-google-can-no-longer-innovate-according-to-a-13-year-veteran/</a></p>
                           <p>In response, industry leaders such as Google and Facebook are in the process of redesigning their offices to facilitate an emergent solution known as the Accidental Collision of Ideas (ACOI).</p>
                           <p><a href="https://tech.cornell.edu/news/how-creative-collisions-drive-innovation/" target="_blank">https://tech.cornell.edu/news/how-creative-collisions-drive-innovation/</a></p>
                           <p>Until now, excepting a modicum of references to serendipity, implementing corporations offer no compelling theory as to why ACOI works, other than to “set the stage”. They claim that the resulting innovations affirm the concept.</p>
                           <p><a href="https://tech.cornell.edu/news/how-creative-collisions-drive-innovation/" target="_blank">https://tech.cornell.edu/news/how-creative-collisions-drive-innovation/</a></p>
                           <p>The fact that companies rely on ACOI to enhance innovation has been widely confirmed. It is further supported by the current volume of capital allocated to the design of the ACOI facilitation space.</p>
                           <p><a href="https://hbr.org/2014/10/workspaces-that-move-people" target="_blank">https://hbr.org/2014/10/workspaces-that-move-people</a></p>
                           <h3>Part II : ACOI Limitations</h3>
                           <p>While ACOI is considered the best practice of utilizing physical space to generate creative ideas, there is currently a dearth of practitioners applying cognitive theory to maximize the innovative output of these accidental collisions.</p>
                           <p>An accident best reflects the current understanding of innovation because existing models cannot objectify why collisions of people produce innovations, even though empirical observation supports that. When creative ideation increases, innovation increases.</p>
                           <p>At XLabs, our challenge was demonstrating that ACOI could be modeled as an intentional process rather than an accident and yield greater innovative output. Toward this end, XLabs' cognitive gaming process “Xperience” is grounded in the emerging science of innovation where innovation (I) is expressed as the product of 3 dynamic variables:</p>
                           <ul>
                               <li>C = Creative Ideation</li>
                               <li>U = Usefulness -</li>
                               <li>A = Ability of an entity or individual to implement Useful Creativity</li>
                           </ul>
                           <p>So that: C + U + A = I (Innovation)</p>
                           <p>XG’s purpose is to disrupt the model where accidents (i.e., ACOI) are at the core of the creative ideational process of Fortune 500 companies and reframe a company’s innovation potential as the Intentional Collision of Ideas (ICOI).</p>
                           <h3>Part III: From Accidents to Intentionality</h3>
                           <h4>The Application of Cognitive Science</h4>
                           <p>Given that collisions yield innovation, engineering the collision process to increase the value of C and/or U (>C, >U), would improve the innovation yield of these collisions.</p>
                           <h4>Game Design</h4>
                           <p>At XLabs,we have designed a dynamic gamification process to stimulate Creativity and Usefulness.</p>
                           <p>Step I: PreVergence - Statement of Intention</p>
                           <p>Step II: Divergence - Convergence (GamePlay)</p>
                           <p>Divergence is introduced into GamePlay through serendipitously generated images (SGI). Players then converge by connecting or finding a typical pattern between their statement of intention and the SGI.</p>
                           <p>Step III: Emergence</p>
                           <p>An entity’s ability (A) to innovate, based on the creative ideation generated by GamePlay, is a function of an entity’s innovation capability (IC).</p>
                           <p><a href="https://www.jotmi.org/index.php/GT/article/view/910" target="_blank">https://www.jotmi.org/index.php/GT/article/view/910</a></p>
                           <p>For this reason, in Step III, all GamePlay ideation is subjected to convergence* with a company’s IC.</p>
                           <p>* XLab is currently exploring the co-development of an IC tool based on the Rainforest Network Score Card.</p>
                           <h4>Cognitive Science</h4>
                           <p>Our ability to make sense of the world is directly related to our ability to find meaningful connections between what we know and what is new. Our brains are wired to make sense out of novelty by fitting the latest and divergent into the patterns we know. This is called contextualization.</p>
                           <p>According to cognitive science, contextualization occurs in the Associative Neural Cortex (ANC). MRI imaging of the brain shows that when we are being creative, our ANC is highly active. This strongly evidences contextualization is neurally linked with creativity and can be intentionally sparked by discovering connections between the known and what is unknown, new, or divergent from what we know.</p>
                           <p>XG has gamified this process and delivers creative ideation on demand!</p>
                           <h4>GamePlay</h4>
                           <p>1) Each player begins GamePlay by stating an intention.</p>
                           <p>While intention is a statement of future direction, its starting point converges with a player’s present knowledge and awareness.</p>
                           <p>2) After stating an intention, the player draws a random LC card, which inputs serendipitously generated information (SGI) into GamePlay. Relative to a Player's intention, SGI constitutes varying degrees of unknown, novel, and divergent information.</p>
                           <p>3) The player connects their intention (LC Card) and the SGI.</p>
                           <p>Connecting intention to unknown, novel, and divergent SGI activates the player’s ANC and generates creative ideation.</p>
                           <p>Connecting intention to SGI is the cognitive equivalent of the collision of ideas.</p>
                           <p>SGI also optimizes the utility of GamePlay’s creative ideation. For a more in-depth discussion on why SGI enhances useful novelty, see the link below on stochastic optimization & machine intelligence.</p>
                           <p>4) In addition to Life Circle Cards, Relate Cards (RC) and Challenge Cards (CC) are the other two structured variables in GamePlay. RCs and CCs are drawn in response to a Player’s statement of intention. If Players (other than the Player who states the intention) agree with the intention or the Player’s ideation of that intention, they can relate (converge). If they disagree, they can challenge (diverge). The relate/challenge process subjects the player’s intention to varying degrees of convergent or divergent input, further enhancing creative ideation and its utility.</p>
                           <h4>Conclusion</h4>
                           <p>GamePlay (Beta Version) is a dynamic gamification process engineered to stimulate Creativity and Usefulness. It is the first genuinely robust operating system for ACOI and transforms random collisions into intentional ideation. This game-like process can be universally customized with any content, demographic, or community.</p>
                           <h4>Contact</h4>
                           <p>Karen Stanwood & Jai Hudes<br>408-963-7014 JaiHudes88@gmail.com</p>`

            const y = event.clientY - rect.top;
            
            const xPercent = (x / rect.width) * 100;
            const yPercent = (y / rect.height) * 100;
            
            const card = document.createElement('div');
            card.className = 'placed-card';
            card.style.left = `${xPercent}%`;
            card.style.top = `${yPercent}%`;
            card.style.backgroundImage = `url('Images/precarius-times/image-${selectedCardForPlacement}.webp')`;
            card.dataset.imgNum = selectedCardForPlacement;
            
            // Drag & Drop events
            card.addEventListener('mousedown', startDrag);
            card.addEventListener('touchstart', startDrag, {passive: false});
            card.addEventListener('click', (e) => e.stopPropagation()); // Prevent placing another card underneath
            
            board.appendChild(card);
            
            // Remove from hand UI
            const selectedEl = document.querySelector('.placement-hand-card.selected');
            if (selectedEl) selectedEl.remove();
            selectedCardForPlacement = null;
        }

        // --- DRAG AND DROP LOGIC FOR PLACED CARDS ---
        function startDrag(e) {
            isDragging = true;
            dragTarget = e.target;
            e.stopPropagation();
        }

        function onDrag(e) {
            if (!isDragging || !dragTarget) return;
            if (e.type === 'touchmove') e.preventDefault(); // Prevent scrolling on touch

            const board = document.getElementById('placement-fractal');
            const rect = board.getBoundingClientRect();
            
            let clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;

            const x = clientX - rect.left;
            const y = clientY - rect.top;
            
            const xPercent = (x / rect.width) * 100;
            const yPercent = (y / rect.height) * 100;
            
            dragTarget.style.left = `${xPercent}%`;
            dragTarget.style.top = `${yPercent}%`;
        }

        function stopDrag() {
            isDragging = false;
            dragTarget = null;
        }

        document.addEventListener('mousemove', onDrag);
        document.addEventListener('mouseup', stopDrag);
        document.addEventListener('touchmove', onDrag, {passive: false});
        document.addEventListener('touchend', stopDrag);

        // --- VISUAL & ANIMATION LOGIC ---
        function showHover(nodeId) {
            const data = nodeData[nodeId];
            hoverTitle.innerText = data.title;
            hoverPreview.style.setProperty('--glow-color', data.color);
            hoverPreview.classList.add('active');
        }

        function hideHover() {
            hoverPreview.classList.remove('active');
        }

        function zoomIn(nodeId) {
            console.log(`zoomIn called for nodeId: ${nodeId}`);
            hideHover(); 

            const data = nodeData[nodeId];
            currentNode = nodeId;

            const oldLayerId = `layer-${historyStack.length}`;
            const newLayerId = `layer-${historyStack.length + 1}`;

            const activeLayer = document.getElementById(oldLayerId);
            activeLayer.style.transformOrigin = origins[nodeId];
            activeLayer.className = 'holonic-container state-zoomed-in';

            viewport.insertAdjacentHTML('beforeend', createLayerHTML(newLayerId, 'state-zoomed-out'));

            const newLayer = document.getElementById(newLayerId);
            void newLayer.offsetWidth; 

            newLayer.className = 'holonic-container state-active';

            const bgColor = getComputedStyle(document.documentElement).getPropertyValue('--bg-color').trim();
            newLayer.querySelector('.outer-ring').style.background = `conic-gradient(from -22.5deg, ${data.color}, ${bgColor}, ${data.color})`;

            // Add random image to the new center core
            const randomNum = Math.floor(Math.random() * (47 - 8 + 1)) + 8;
            const paddedNum = randomNum.toString().padStart(2, '0');
            const centerCore = newLayer.querySelector('.center-core');
            centerCore.style.backgroundImage = `url('Images/precarius-times/image-${paddedNum}.webp')`;
            centerCore.style.backgroundSize = 'cover';
            centerCore.style.backgroundPosition = 'center';
            centerCore.style.backgroundRepeat = 'no-repeat';

            // Make the card image disappear from the center core after 4 seconds
            setTimeout(() => {
                centerCore.style.backgroundImage = '';
            }, 4000);

            historyStack.push(nodeId);
            imageHistoryStack.push(paddedNum);
            updateHandTracker();

            // UI Updates
            mainTitle.innerText = data.infoTitle || data.title;
            mainTitle.style.textShadow = `0 0 20px ${data.color}`;
            mainTitle.style.color = data.color;
            navHint.classList.add('visible');

            // Clear existing timeout and reset the bottom box content
            clearTimeout(layerBoxTimeout);
            layerBoxTitle.innerText = data.infoTitle || data.title;
            layerBoxDesc.innerText = data.desc;
            layerBoxHint.innerText = data.actionLine !== undefined ? data.actionLine : "Click here to eXplore full details";
            layerInfoBox.style.setProperty('--glow-color', data.color);

            setTimeout(() => {
                if(document.getElementById(oldLayerId) && document.getElementById(oldLayerId).classList.contains('state-zoomed-in')) {
                    document.getElementById(oldLayerId).style.display = 'none';
                }
            }, 4000); 

            // Always delay showing the bottom box slightly for dramatic effect
            layerBoxTimeout = setTimeout(() => {
                if (!hoverPreview.classList.contains('active')) {
                    layerInfoBox.classList.add('visible');
                }
            }, 1000);
        }

        function zoomOut(event) {
            if (event) event.stopPropagation(); // Prevents click from bubbling to any elements behind it
            mobileFocusedNode = null;
            clearMobileFocus();
            hideHover();
            clearTimeout(layerBoxTimeout);
            layerInfoBox.classList.remove('visible'); 

            if (historyStack.length === 0) return; 

            const currentLayerId = `layer-${historyStack.length}`;
            const previousLayerId = `layer-${historyStack.length - 1}`;

            const currentLayer = document.getElementById(currentLayerId);
            currentLayer.style.transformOrigin = "50% 50%";
            currentLayer.className = 'holonic-container state-zoomed-out';

            const prevLayer = document.getElementById(previousLayerId);
            prevLayer.style.display = 'block';
            void prevLayer.offsetWidth;
            prevLayer.className = 'holonic-container state-active';

            setTimeout(() => {
                currentLayer.remove();
            }, 4000);

            historyStack.pop();
            imageHistoryStack.pop();
            updateHandTracker();

            if(historyStack.length === 0) {
                currentNode = null;
                mainTitle.innerText = "THE INFINITE GAME";
                mainTitle.style.color = getComputedStyle(document.documentElement).getPropertyValue('--text-color').trim();
                mainTitle.style.textShadow = `0 0 15px ${mainTitle.style.color}`;
                navHint.classList.remove('visible');
            } else {
                currentNode = historyStack[historyStack.length - 1];
                const parentData = nodeData[currentNode];
                mainTitle.innerText = parentData.infoTitle || parentData.title;
                mainTitle.style.color = parentData.color;
                mainTitle.style.textShadow = `0 0 20px ${parentData.color}`;
            }
        }

        // --- FULL SCREEN MODAL LOGIC ---
        function openFullScreenModal() {
            if(!currentNode) return;

            // Special handling for media nodes
            if (currentNode === 'ne') {
                playPromoVideo();
                return;
            }

            // If a video is playing, don't open the modal for text content
            if (fullScreenModal.dataset.currentVideo === 'true') {
                return;
            }

            // Otherwise, open modal with text content
            const data = nodeData[currentNode];

            // Parse [Image XX] anchors into optimized WebP image tags
            const parsedText = data.fullText.replace(/\[Image (\d{2})\]/g, (match, num) => {
                return `<img src="Images/precarius-times/image-${num}.webp" class="content-image" alt="PrecariUS Image ${num}" loading="lazy">`;
            });
            modalBody.innerHTML = parsedText;

            fullScreenModal.style.setProperty('--glow-color', data.color);
            fullScreenModal.classList.add('active');
        }

        function closeFullScreenModal() {
            fullScreenModal.classList.remove('active');
            // Pause and clear video if it was playing
            console.log('Closing modal. Checking for media to pause and clear.');
            const videoElement = modalBody.querySelector('video');
            if (videoElement) {
                videoElement.pause();
                videoElement.currentTime = 0; // Reset video to start
            }
            
            // Reset any full-screen inline styles from PDF view
            const innerContent = document.querySelector('.modal-inner-content');
            innerContent.style.width = '';
            innerContent.style.height = '';
            innerContent.style.maxWidth = '';
            innerContent.style.maxHeight = '';
            innerContent.style.borderRadius = '';
            innerContent.style.padding = '';

            setTimeout(() => { modalBody.innerHTML = ''; }, 500); // Clear content after fade
        }

        // Function to play the promo video
        function playPromoVideo() {
            console.log('Attempting to play promo video: Videos/X—THE GAME™ Promo video.mp4');
            // Clear any existing content in the modal body
            modalBody.innerHTML = '';

            try {
                // Create video element
                const videoElement = document.createElement('video');
                videoElement.src = 'Videos/X—THE GAME™ Promo video.mp4';
            videoElement.controls = true; videoElement.muted = true; // Show video controls, and mute by default for autoplay
                videoElement.autoplay = true; // Autoplay the video
                videoElement.style.width = '100%';
                videoElement.style.height = 'auto';
                videoElement.style.display = 'block'; // Ensure it takes up space
                videoElement.style.maxWidth = '100%'; // Ensure video fits within modal
                videoElement.style.maxHeight = 'calc(80vh - 120px)'; // Adjust based on modal padding

                // Add event listeners for debugging
                videoElement.addEventListener('error', (e) => {
                    console.error('Video playback error:', e);
                    console.error('Video source:', videoElement.src);
                    modalBody.innerHTML = '<p style="color: red;">Error loading video. Please check the file path and format.</p>';
                });
                videoElement.addEventListener('loadedmetadata', () => { console.log('Video metadata loaded successfully.'); });
                videoElement.addEventListener('play', () => { console.log('Video started playing.'); });
                videoElement.addEventListener('pause', () => { console.log('Video paused.'); });

                // Append video to modal body
                modalBody.appendChild(videoElement);

                // Set a glow color for the modal (e.g., from the 'ne' node)
                fullScreenModal.style.setProperty('--glow-color', nodeData.ne.color);

                // Show modal
                fullScreenModal.classList.add('active');

                // Store the video element reference to pause it later
                fullScreenModal.dataset.currentVideo = 'true'; // A flag to indicate video is playing
            } catch (error) {
                console.error('Error creating or playing video element:', error);
                modalBody.innerHTML = '<p style="color: red;">An unexpected error occurred while trying to play the video.</p>';
            }
        }

    </script>
</body>
</html>
